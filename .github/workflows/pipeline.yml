name: cicd pipeline

# Triggers: Runs automatically on push to main OR manually via button click
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # The block containing our sequence of tasks
  build:
    runs-on: ubuntu-latest

    # The two specific steps defined in your instructions
    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v3
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Login to Amazon ECR
          uses: aws-actions/amazon-ecr-login@v2
      
        - name: Build docker image
          run: docker build -t ${{ secrets.ECR_REPO }}:latest .

        - name: Push docker image to Amazon ECR
          run: docker push ${{ secrets.ECR_REPO }}:latest
          


